<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>YouTube SEO Description Generator</title>
  <style>body{font-family:system-ui,-apple-system,sans-serif;margin:0;padding:20px;background:#f5f5f5}header{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1);margin-bottom:20px}input[type="password"]{padding:8px;width:300px;border:1px solid #ccc;border-radius:4px}.video-card{background:#fff;padding:20px;margin-bottom:20px;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1)}.video-title{margin-top:0;color:#333}.details{display:flex;gap:20px;margin-bottom:15px}.col{flex:1}.col textarea{width:100%;height:150px;padding:8px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;resize:vertical}button{background:#1a73e8;color:#fff;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;font-size:16px}button:hover{background:#1557b0}button:disabled{background:#ccc;cursor:not-allowed}.ai-output{margin-top:15px;padding:15px;background:#e8f0fe;border-radius:4px;white-space:pre-wrap;display:none}.loading{color:#666;font-style:italic;display:none}</style>
</head>
<body>
  <header>
    <h1>YouTube SEO Description Generator</h1>
    <div>
      <label for="apiKey">Gemini API Key: </label>
      <input type="password" id="apiKey" placeholder="Enter your Gemini API Key">
    </div>
  </header>
  <div id="videoContainer"></div>

  <script>
    const digiwinProducts = `
鼎新數智提供涵蓋企業成長各階段的數位化與智能產品解決方案：
1. 企業 AI: 企業AI助理, AI私有部署, AI知識庫 ChatFile, METIS 平台
2. ERP系統: T100 ERP (集團大型), Workflow ERP GP (中大型製造), Cosmos ERP (中大型流通), SmartERP (中小企業), A1商務應用雲
3. ERPⅡ 管理延展應用: EasyFlow BPM (流程管理), BI (商業智慧), CRM (客戶關係), HR (人力資源), POS (銷售點), EAI (整合應用), 財務管理系統, 進銷存管理系統
4. 智能與OT應用: 廠內智能物流, PLM (產品生命週期), APS (智能排程), MES (製造執行), sFWR (數智工廠戰情室), 機聯網APP, 能源管理APP, 碳盤查
5. 雲端平台與服務: 鼎新ESG數位服務平台, 營運監控雲平台, 鼎新雲市場, 鼎新服務雲, 資訊委外, 鼎新企業醫生
6. 企業資安: 資安風險評估, 資安檢測, ISO27001顧問
`;

    const videoData = {{VIDEO_DATA}};
    
    function renderVideos() {
      const container = document.getElementById('videoContainer');
      videoData.forEach((video, index) => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
          <h2 class="video-title"><a href="https://www.youtube.com/watch?v=${video.id}" target="_blank">${video.title}</a></h2>
          <div class="details">
            <div class="col">
              <strong>原 Description:</strong>
              <textarea readonly>${video.description}</textarea>
            </div>
            <div class="col">
              <strong>字幕 (Subtitles):</strong>
              <textarea readonly>${video.subtitles || '無可用字幕'}</textarea>
            </div>
          </div>
          <button id="btn-${index}" onclick="generateSEO(${index})">✨ AI 建議</button>
          <div id="loading-${index}" class="loading">Gemini 正在產生中...請稍候</div>
          <div id="output-${index}" class="ai-output"></div>
        `;
        container.appendChild(card);
      });
    }

    async function generateSEO(index) {
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) {
        alert('請先輸入 Gemini API Key');
        return;
      }

      const btn = document.getElementById(`btn-${index}`);
      const loading = document.getElementById(`loading-${index}`);
      const output = document.getElementById(`output-${index}`);
      const video = videoData[index];

      btn.disabled = true;
      loading.style.display = 'block';
      output.style.display = 'none';

      const prompt = `
你是一位專業的 SEO 專家與行銷企劃。我們是「鼎新數智 (Digiwin)」，我們有以下的產品與服務：
${digiwinProducts}

現在有一支我們的 YouTube 影片需要優化 Description。
【影片標題】：${video.title}
【原始說明】：${video.description}
【影片字幕】：${video.subtitles.substring(0, 15000)}

請幫我重新撰寫一段「SEO 友好」的 YouTube 影片說明 (Description)，請遵循以下規則：
1. 結合原有的 description 內容（保留重要連結與資訊），並加上適合搜尋引擎的關鍵字，讓語氣更通順吸引人。
2. 判斷影片內容（標題、說明、字幕）是否有跟上述「鼎新數智產品」相關。如果有可以延伸帶到的產品或服務，請在 description 中自然地提及並說明該產品如何幫助解決問題；若沒有關聯，則單純以影片內容為主產生 description，不用硬塞產品。
3. 排版需易讀，可適度使用 emoji 與條列式重點。
4. 請直接輸出最終要放上 YouTube 的 description，不需輸出其他寒暄對話。
`;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }]
          })
        });

        const data = await response.json();
        if (data.error) {
          throw new Error(data.error.message);
        }

        const generatedText = data.candidates[0].content.parts[0].text;
        output.textContent = generatedText;
        output.style.display = 'block';
      } catch (err) {
        alert('API 呼叫失敗: ' + err.message);
      } finally {
        btn.disabled = false;
        loading.style.display = 'none';
      }
    }

    window.onload = renderVideos;
  </script>
</body>
</html>
